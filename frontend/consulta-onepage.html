<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Consultar One Page RASP</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, Helvetica, sans-serif;
      background: #f3f6fb;
      color: #111827;
    }

    .container {
      max-width: 620px;
      margin: 80px auto;
      background: #ffffff;
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 18px 45px rgba(15, 23, 42, 0.12);
    }

    h1 {
      margin: 0 0 8px;
      font-size: 30px;
      color: #0f172a;
    }

    p {
      margin: 0 0 28px;
      color: #64748b;
      font-size: 15px;
    }

    label {
      display: block;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .linha-busca {
      display: flex;
      gap: 12px;
    }

    input {
      flex: 1;
      height: 46px;
      border: 1px solid #cbd5e1;
      border-radius: 10px;
      padding: 0 14px;
      font-size: 18px;
      box-sizing: border-box;
    }

    button {
      height: 46px;
      border: none;
      border-radius: 10px;
      padding: 0 22px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-primary {
      background: #0b5ed7;
      color: #ffffff;
    }

    .btn-secondary {
      background: #e2e8f0;
      color: #0f172a;
      margin-top: 18px;
    }

    .status {
      margin-top: 18px;
      padding: 12px 14px;
      border-radius: 10px;
      font-size: 14px;
      display: none;
    }

    .status.ok {
      display: block;
      background: #dcfce7;
      color: #166534;
      border: 1px solid #86efac;
    }

    .status.erro {
      display: block;
      background: #fee2e2;
      color: #991b1b;
      border: 1px solid #fca5a5;
    }

    .acoes {
      margin-top: 24px;
      display: flex;
      gap: 12px;
      justify-content: flex-start;
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>Consultar One Page RASP</h1>
    <p>Informe o número do RASP para abrir a One Page vinculada.</p>

    <label for="numeroRasp">Número do RASP</label>

    <div class="linha-busca">
      <input
        type="text"
        id="numeroRasp"
        placeholder="Ex.: 0087/26"
        maxlength="7"
        autocomplete="off"
      />

      <button type="button" id="btnBuscar" class="btn-primary">
        Buscar
      </button>
    </div>

    <div id="statusBusca" class="status"></div>

    <div class="acoes">
      <button type="button" class="btn-secondary" onclick="window.location.href='home.html'">
        Menu inicial
      </button>

      <button type="button" class="btn-secondary" onclick="window.location.href='index.html'">
        Novo RASP
      </button>
    </div>
  </div>

  <script>
    const API_BASE_URL = "http://localhost:5050";

    const numeroRaspInput = document.getElementById("numeroRasp");
    const btnBuscar = document.getElementById("btnBuscar");
    const statusBusca = document.getElementById("statusBusca");

    function mostrarStatus(texto, tipo) {
      statusBusca.textContent = texto;
      statusBusca.className = `status ${tipo}`;
    }

    function formatarNumeroRasp(valor) {
      const numeros = String(valor || "").replace(/\D/g, "").slice(0, 6);

      if (numeros.length <= 4) {
        return numeros;
      }

      return `${numeros.slice(0, 4)}/${numeros.slice(4)}`;
    }

    numeroRaspInput.addEventListener("input", () => {
      numeroRaspInput.value = formatarNumeroRasp(numeroRaspInput.value);
    });

    numeroRaspInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        btnBuscar.click();
      }
    });

    btnBuscar.addEventListener("click", async () => {
      const numeroRasp = numeroRaspInput.value.trim();

      if (!numeroRasp) {
        mostrarStatus("Informe o número do RASP.", "erro");
        return;
      }

      try {
        mostrarStatus("Buscando RASP...", "ok");

        const response = await fetch(
          `${API_BASE_URL}/rasp/numero/${encodeURIComponent(numeroRasp)}`
        );

        if (!response.ok) {
          mostrarStatus("RASP não encontrado.", "erro");
          return;
        }

        const rasp = await response.json();

        const idRasp =
          rasp.idRasp ||
          rasp.id_rasp ||
          rasp.id;

        if (!idRasp) {
          mostrarStatus("RASP localizado, mas a API não retornou o ID.", "erro");
          return;
        }

        window.location.href = `onepage.html?idRasp=${idRasp}`;
      } catch (erro) {
        console.error(erro);
        mostrarStatus("Erro ao consultar a API.", "erro");
      }
    });
  </script>
</body>
</html>
