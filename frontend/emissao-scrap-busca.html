<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Buscar RASP - Emissão Rejeitado</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Segoe UI,Arial,sans-serif}
body{background:#071426;color:#e5eefc;min-height:100vh;display:flex;align-items:center;justify-content:center}
.card{width:520px;background:#0d1f38;border:1px solid #1e88e5;border-radius:16px;padding:28px;box-shadow:0 0 30px rgba(30,136,229,.25)}
h1{color:#5bb6ff;margin-bottom:8px}
p{color:#9fb7d8;margin-bottom:22px}
label{display:block;margin-bottom:8px;font-weight:700}
input{width:100%;padding:14px;border-radius:10px;border:1px solid #1e88e5;background:#071426;color:#fff;font-size:18px}
.actions{display:flex;gap:12px;justify-content:flex-end;margin-top:22px}
button{border:0;border-radius:8px;padding:11px 20px;font-weight:800;cursor:pointer;color:white}
.btn-gray{background:#475569}
.btn-blue{background:#0f6dff}
.msg{margin-top:16px;color:#ffcc66;font-weight:700}
</style>
</head>
<body>

<div class="card">
  <h1>Emissão Rejeitado</h1>
  <p>Informe o número do RASP para emitir o formulário de rejeitado.</p>

  <label>Número do RASP</label>
  <input
  id="numeroRasp"
  placeholder="Ex: 0085/26"
  maxlength="7"
  autofocus
  oninput="formatarRasp(this)">


  <div class="actions">
    <button class="btn-gray" onclick="window.location.href='home.html'">Voltar</button>
    <button class="btn-blue" onclick="abrirEmissao()">Continuar</button>
  </div>

  <div class="msg" id="msg"></div>
</div>


<script>
function formatarRasp(input){
  let valor = input.value.replace(/\D/g, "");

  if(valor.length > 6){
    valor = valor.substring(0, 6);
  }

  if(valor.length > 4){
    valor = valor.substring(0,4) + "/" + valor.substring(4);
  }

  input.value = valor;
}

function abrirEmissao(){
  const numero = document.getElementById("numeroRasp").value.trim();

  if(!/^\d{4}\/\d{2}$/.test(numero)){
    document.getElementById("msg").innerText =
      "Informe o RASP no formato 0085/26.";
    return;
  }

  window.location.href =
    "emissao-scrap.html?rasp=" + encodeURIComponent(numero);
}

document.getElementById("numeroRasp").addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    abrirEmissao();
  }
});
</script>


</body>
</html>
